name: Keep Streamlit Apps Awake

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours.
    - cron: "17 */6 * * *"

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Visit Streamlit apps
        env:
          HEADLESS: "true"
          VISIT_SECONDS: "60"
          BETWEEN_APPS_SECONDS: "10"
          STREAMLIT_URLS: |
            https://lytlerushcalculator.streamlit.app/
            https://quantanalysisck.streamlit.app/
            https://exceltopdfck.streamlit.app/
        run: python keep_awake.py
